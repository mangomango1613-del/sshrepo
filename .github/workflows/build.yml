name: Build Windows EXE (Nuitka + BusyBox + Sign)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  APP_NAME: PyTermSSH
  PYTHONUTF8: 1

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Nuitka build cache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: nuitka-${{ runner.os }}-

      - name: Cache BusyBox download
        uses: actions/cache@v4
        with:
          path: bundled_env/busybox.exe
          key: busybox-w64-v1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Download BusyBox (bundled Unix env)
        run: python tools/download_busybox.py

      - name: Build with Nuitka
        shell: cmd
        run: |
          set ICON_ARG=
          if exist icon.ico set ICON_ARG=--windows-icon-from-ico=icon.ico
          python -m nuitka ^
            --standalone ^
            --assume-yes-for-downloads ^
            --prefer-source-code ^
            --windows-console-mode=force ^
            --output-filename=${{ env.APP_NAME }}.exe ^
            --output-dir=dist ^
            --enable-plugin=pyside6 ^
            --include-package=paramiko,pyte,cryptography,sqlalchemy,bcrypt,core,db,ui ^
            --include-data-dir=bundled_env=bundled_env ^
            --nofollow-import-to=tkinter,matplotlib,numpy ^
            --nofollow-import-to=PySide6.Qt3DAnimation,PySide6.Qt3DCore,PySide6.Qt3DExtras ^
            --nofollow-import-to=PySide6.QtBluetooth,PySide6.QtCharts,PySide6.QtDataVisualization ^
            --nofollow-import-to=PySide6.QtGraphs,PySide6.QtMultimedia,PySide6.QtMultimediaWidgets ^
            --nofollow-import-to=PySide6.QtNetwork,PySide6.QtOpenGL,PySide6.QtOpenGLWidgets ^
            --nofollow-import-to=PySide6.QtPdf,PySide6.QtPdfWidgets,PySide6.QtPrintSupport ^
            --nofollow-import-to=PySide6.QtQml,PySide6.QtQuick,PySide6.QtQuickControls2 ^
            --nofollow-import-to=PySide6.QtQuickWidgets,PySide6.QtRemoteObjects ^
            --nofollow-import-to=PySide6.QtSvg,PySide6.QtSvgWidgets,PySide6.QtTest ^
            --nofollow-import-to=PySide6.QtUiTools,PySide6.QtWebEngineCore ^
            --nofollow-import-to=PySide6.QtWebEngineWidgets,PySide6.QtWebSockets,PySide6.QtXml ^
            --nofollow-import-to=sqlalchemy.dialects.postgresql,sqlalchemy.dialects.mysql ^
            --nofollow-import-to=sqlalchemy.dialects.oracle,sqlalchemy.dialects.mssql ^
            --nofollow-import-to=sqlalchemy.testing ^
            %ICON_ARG% ^
            --company-name=PyTermSSH --product-name=${{ env.APP_NAME }} ^
            --file-version=1.0.0.0 --product-version=1.0.0.0 ^
            --python-flag=no_warnings ^
            main.py

      - name: Report build info
        shell: pwsh
        run: |
          # Dynamically search the 'dist' directory to find where Nuitka placed the exe
          $exeFile = Get-ChildItem -Path dist -Filter "${{ env.APP_NAME }}.exe" -Recurse | Select-Object -First 1
          if ($null -eq $exeFile) {
              Write-Error "Could not find ${{ env.APP_NAME }}.exe in the build output!"
              exit 1
          }
          $exe = $exeFile.FullName
          $exeMb = [math]::Round(($exeFile).Length/1MB, 1)
          
          # Calculate total folder size of the standalone distribution directory
          $distFolder = $exeFile.Directory.FullName
          $totalBytes = (Get-ChildItem -Path $distFolder -Recurse | Measure-Object -Property Length -Sum).Sum
          $totalMb = [math]::Round($totalBytes/1MB, 1)

          Write-Host "=== Build Complete ==="
          Write-Host "Executable Path: $exe"
          Write-Host "Executable File Size: $exeMb MB"
          Write-Host "Total Distribution Folder Size: $totalMb MB (Includes BusyBox & Python dependencies)"
          $sig = (Get-AuthenticodeSignature $exe).Status
          Write-Host "Signature: $sig"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-standalone
          # Crucial: Upload the whole folder layout. The exe needs its neighboring DLL files to run.
          path: dist/